// ---- Signature motif: the West Covina flag's gold ring of stars ----------
function StarRing({ size = 120, stars = 10, color = C.gold, stroke = C.gold, opacity = 1 }) {
  const cx = size / 2;
  const cy = size / 2;
  const r = size * 0.38;
  const pts = [];
  for (let i = 0; i < stars; i++) {
    const a = (i / stars) * Math.PI * 2 - Math.PI / 2;
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
  }
  const Star = ({ x, y, s = size * 0.05 }) => {
    const p = [];
    for (let k = 0; k < 10; k++) {
      const rad = k % 2 === 0 ? s : s / 2.4;
      const ang = (k / 10) * Math.PI * 2 - Math.PI / 2;
      p.push(`${x + rad * Math.cos(ang)},${y + rad * Math.sin(ang)}`);
    }
    return <polygon points={p.join(" ")} fill={color} />;
  };
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ opacity }} aria-hidden="true">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={stroke} strokeWidth={size * 0.018} opacity={0.55} />
      {pts.map((p, i) => (
        <Star key={i} x={p[0]} y={p[1]} />
      ))}
    </svg>
  );
}

// ---- Scroll-reveal hook --------------------------------------------------
// Adds a "is-in" class when the element scrolls into view (CSS handles the
// fade/slide). Respects prefers-reduced-motion via the stylesheet.
function useReveal() {
  const ref = React.useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add("is-in");
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.15 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function Reveal({ children, delay = 0, style }) {
  const ref = useReveal();
  return (
    <div ref={ref} className="wc-reveal" style={{ transitionDelay: `${delay}ms`, ...style }}>
      {children}
    </div>
  );
}

  * { box-sizing: border-box; }
  body { margin: 0; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input:focus, select:focus, textarea:focus, button:focus-visible, a:focus-visible {
    outline: 3px solid ${C.sky}; outline-offset: 2px;
  }

  /* --- Waffle button --- */
  .wc-waffle { transition: background .2s ease, transform .2s ease; }
  .wc-waffle:hover { background: rgba(242,183,5,0.25) !important; transform: scale(1.05); }

  /* --- Overlay menu --- */
  @keyframes wcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes wcItem { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .wc-overlay { animation: wcFade .28s ease forwards; }
  .wc-overlay-item { opacity: 0; animation: wcItem .5s cubic-bezier(.2,.7,.2,1) forwards; }
  .wc-overlay-item:hover { color: #fff !important; background: rgba(255,255,255,0.06); }

  /* --- Ken Burns drift on hero photo --- */
  @keyframes wcKen { 0% { transform: scale(1.04) translate(0,0); } 100% { transform: scale(1.12) translate(-1.5%, -1.5%); } }
  .wc-kenburns { animation: wcKen 26s ease-in-out infinite alternate; }

  /* --- Hero load-in sequence --- */
  @keyframes wcRise { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  .wc-load { opacity: 0; animation: wcRise 0.8s cubic-bezier(.2,.7,.2,1) forwards; }
  .wc-load-1 { animation-delay: 0.15s; }
  .wc-load-2 { animation-delay: 0.32s; }
  .wc-load-3 { animation-delay: 0.5s; }
  .wc-load-4 { animation-delay: 0.68s; }

  /* --- Scroll reveal --- */
  .wc-reveal { opacity: 0; transform: translateY(30px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
  .wc-reveal.is-in { opacity: 1; transform: translateY(0); }

  /* --- Card hover micro-interaction --- */
  .wc-card { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease; }
  .wc-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(11,46,92,0.18); }

  /* --- Button hover --- */
  .wc-btn { transition: transform .2s ease, filter .2s ease; }
  .wc-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

  /* --- Star ring slow rotation --- */
  @keyframes wcSpin { to { transform: rotate(360deg); } }
  .wc-spin { animation: wcSpin 90s linear infinite; transform-origin: center; }

  /* --- Scene ambient motion --- */
  @keyframes wcMist { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .wc-mist { animation: wcMist 40s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    * { scroll-behavior: auto !important; }
    .wc-load, .wc-reveal, .wc-overlay-item { animation: none !important; opacity: 1 !important; transform: none !important; transition: none !important; }
    .wc-spin, .wc-mist, .wc-kenburns { animation: none !important; }
    .wc-card:hover, .wc-btn:hover, .wc-waffle:hover { transform: none !important; }
  }
`;
