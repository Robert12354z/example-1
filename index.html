const C = {
  navy: "#0B2E5C",
  sky: "#2E78C7",
  gold: "#F2B705",
  amber: "#E08A3C",
  paper: "#F7F9FC",
  ink: "#0D1B2A",
  line: "#D8E1EE",
};

// ---- Signature motif: the West Covina flag's gold ring of stars ----------
function StarRing({ size = 120, stars = 10, color = C.gold, stroke = C.gold, opacity = 1 }) {
  const cx = size / 2;
  const cy = size / 2;
  const r = size * 0.38;
  const pts = [];
  for (let i = 0; i < stars; i++) {
    const a = (i / stars) * Math.PI * 2 - Math.PI / 2;
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
  }
  const Star = ({ x, y, s = size * 0.05 }) => {
    const p = [];
    for (let k = 0; k < 10; k++) {
      const rad = k % 2 === 0 ? s : s / 2.4;
      const ang = (k / 10) * Math.PI * 2 - Math.PI / 2;
      p.push(`${x + rad * Math.cos(ang)},${y + rad * Math.sin(ang)}`);
    }
    return <polygon points={p.join(" ")} fill={color} />;
  };
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ opacity }} aria-hidden="true">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={stroke} strokeWidth={size * 0.018} opacity={0.55} />
      {pts.map((p, i) => (
        <Star key={i} x={p[0]} y={p[1]} />
      ))}
    </svg>
  );
}

// ---- Scroll-reveal hook --------------------------------------------------
// Adds a "is-in" class when the element scrolls into view (CSS handles the
// fade/slide). Respects prefers-reduced-motion via the stylesheet.
function useReveal() {
  const ref = React.useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add("is-in");
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.15 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function Reveal({ children, delay = 0, style }) {
  const ref = useReveal();
  return (
    <div ref={ref} className="wc-reveal" style={{ transitionDelay: `${delay}ms`, ...style }}>
      {children}
    </div>
  );
}

// ---- Signature background: layered San Gabriel Valley scene --------------
// Pure CSS/SVG. No external images = no copyright risk. Evokes the mountain
// range that frames West Covina, valley haze, palms, and walnut-grove rows.
function ValleyScene() {
  return (
    <div style={S.scene} aria-hidden="true">
      {/* uploaded West Covina photo as the base layer */}
      <div style={{ ...S.scenePhoto, backgroundImage: `url(${WC_PHOTO})` }} className="wc-kenburns" />
      {/* navy tint so white hero text stays readable over the photo */}
      <div style={S.sceneTint} />
      {/* SVG ridge/grove layers kept as a subtle textural overlay at the base */}
      <svg style={S.sceneSvg} viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax slice">
        {/* valley floor haze only — ridges now come from the photo */}
        <rect x="0" y="420" width="1440" height="180" fill="url(#wc-haze)" />
        <g className="wc-grove" opacity="0.22" stroke="#0c2f5c" strokeWidth="2">
          <line x1="120" y1="600" x2="500" y2="470" />
          <line x1="360" y1="600" x2="620" y2="470" />
          <line x1="640" y1="600" x2="760" y2="470" />
          <line x1="940" y1="600" x2="900" y2="470" />
          <line x1="1240" y1="600" x2="1040" y2="470" />
        </g>
        <defs>
          <linearGradient id="wc-haze" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#2E78C7" stopOpacity="0" />
            <stop offset="100%" stopColor="#0B2E5C" stopOpacity="0.75" />
          </linearGradient>
        </defs>
      </svg>
      {/* drifting valley haze overlay */}
      <div className="wc-mist" style={S.mist} />
    </div>
  );
}

function Volunteer() {
  const [done, setDone] = useState(false);
  const [vals, setVals] = useState({ name: "", email: "", interest: "Knock on doors" });
  const [err, setErr] = useState("");

  // [PLACEHOLDER FORM HANDLER]
  // This does NOT send anywhere yet. To make it real, set FORM_ENDPOINT above
  // to a Formspree/Netlify endpoint and POST `vals` to it inside the try block.
  const submit = (e) => {
    e.preventDefault();
    if (!vals.name.trim() || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(vals.email)) {
      setErr("Please enter your name and a valid email.");
      return;
    }
    setErr("");
    setDone(true);
  };

  if (done)
    return (
      <PageShell title="Thank you" kicker="Volunteer">
        <p style={S.body}>
          Thanks for stepping up for District 5. We'll be in touch soon about how
          you can help. (Note: this is a demo confirmation — wire the form to a
          real service to actually receive signups.)
        </p>
      </PageShell>
    );

  return (
    <PageShell title="Join the campaign" kicker="Volunteer / Get Involved">
      <p style={{ ...S.body, maxWidth: 560, marginBottom: 28 }}>
        Campaigns are won by neighbors talking to neighbors. Tell us how you'd
        like to help and we'll find you a place on the team.
      </p>
      <form onSubmit={submit} style={S.form} noValidate>
        <Field label="Full name">
          <input style={S.input} value={vals.name} onChange={(e) => setVals({ ...vals, name: e.target.value })} placeholder="Your name" />
        </Field>
        <Field label="Email">
          <input style={S.input} type="email" value={vals.email} onChange={(e) => setVals({ ...vals, email: e.target.value })} placeholder="you@email.com" />
        </Field>
        <Field label="How would you like to help?">
          <select style={S.input} value={vals.interest} onChange={(e) => setVals({ ...vals, interest: e.target.value })}>
            <option>Knock on doors</option>
            <option>Make phone calls</option>
            <option>Host a meet-and-greet</option>
            <option>Put up a yard sign</option>
            <option>Wherever I'm needed</option>
          </select>
        </Field>
        {err && <div style={S.err}>{err}</div>}
        <button type="submit" style={S.btnPrimary}>
          Count me in
        </button>
      </form>
    </PageShell>
  );
}

// ==========================================================================
//  Root: header + router + footer
// ==========================================================================
function App() {
  const [page, setPage] = useState("Home");
  const [menu, setMenu] = useState(false);
  const go = (p) => {
    setPage(p);
    setMenu(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  useEffect(() => {
    document.title = `Jimmy Lima — ${page}`;
  }, [page]);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") setMenu(false);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const Body = { Home, About, Issues, Endorsements, Volunteer, Contact }[page];

  return (
    <div style={S.root}>
      <style>{GLOBAL}</style>

      {/* Header */}
      <header style={S.header}>
        <div style={{ ...S.wrap, ...S.headRow }}>
          <button style={S.brand} onClick={() => go("Home")}>
            <StarRing size={34} stars={10} />
            <span style={S.brandText}>
              Jimmy <strong>Lima</strong>
            </span>
          </button>
          <button
            style={S.waffle}
            className="wc-waffle"
            onClick={() => setMenu(true)}
            aria-label="Open navigation menu"
            aria-expanded={menu}
          >
            {Array.from({ length: 9 }).map((_, i) => (
              <span key={i} style={S.waffleDot} />
            ))}
          </button>
        </div>
      </header>

      {/* Full-screen navigation overlay (opened by the waffle menu) */}
      {menu && (
        <div style={S.overlay} className="wc-overlay" role="dialog" aria-modal="true" aria-label="Site navigation">
          <button style={S.overlayClose} onClick={() => setMenu(false)} aria-label="Close menu">
            ×
          </button>
          <div style={S.overlayRing}>
            <StarRing size={300} stars={10} opacity={0.12} />
          </div>
          <nav style={S.overlayNav}>
            {PAGES.map((p, i) => (
              <button
                key={p}
                onClick={() => go(p)}
                style={{ ...S.overlayItem, ...(page === p ? S.overlayActive : {}), animationDelay: `${i * 60}ms` }}
                className="wc-overlay-item"
              >
                <span style={S.overlayNum}>{String(i + 1).padStart(2, "0")}</span>
                {p}
              </button>
            ))}
            <a
              href={DONATE_URL}
              target="_blank"
              rel="noopener noreferrer"
              style={{ ...S.overlayItem, ...S.overlayDonate, animationDelay: `${PAGES.length * 60}ms` }}
              className="wc-overlay-item"
            >
              <span style={{ ...S.overlayNum, color: C.navy }}>★</span>
              Donate
            </a>
          </nav>
        </div>
      )}

      {/* Page */}
      <main>
        <Body go={go} />
      </main>

      {/* Footer */}
      <footer style={S.footer}>
        <div style={{ ...S.wrap, ...S.footRow }}>
          <div>
            <div style={S.footBrand}>
              <StarRing size={28} stars={10} />
              <span>
                Jimmy <strong>Lima</strong>
              </span>
            </div>
            <p style={S.footDisc}>
              {/* [PLACEHOLDER] required campaign-finance disclaimer */}
              Paid for by Friends of Jimmy Lima for City Council, District 5.
              <br />
              FPPC ID #0000000.
            </p>
          </div>
          <div style={S.footNav}>
            {PAGES.map((p) => (
              <button key={p} onClick={() => go(p)} style={S.footLink}>
                {p}
              </button>
            ))}
          </div>
          <div style={S.footSocial}>
            <span style={S.footHead}>Follow</span>
            {["Facebook", "Instagram", "X"].map((s) => (
              <a key={s} href="#" style={S.footLink}>
                {s}
              </a>
            ))}
          </div>
        </div>
        <div style={S.footBottom}>© {new Date().getFullYear()} Friends of Jimmy Lima · West Covina, California</div>
      </footer>
    </div>
  );
}
